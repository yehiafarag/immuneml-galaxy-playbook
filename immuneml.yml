---
# ========================================================================
# IMMUNEML GALAXY ORCHESTRATOR
# ========================================================================
#
# This playbook is the main entry point for the ImmuneML Galaxy deployment.
#
# Flow:
#   1. Check whether the Galaxy baseline already exists
#   2. If Galaxy is missing, run the galaxy_deployment role
#   3. Install ImmuneML runtime on top of Galaxy
#
# The galaxy_deployment role is installed from requirements.yml.
# ========================================================================

# ------------------------------------------------------------------------
# PLAY 1: Check whether Galaxy baseline is deployed and running
# ------------------------------------------------------------------------
- name: Check whether Galaxy baseline is deployed and running
  hosts: galaxyservers
  become: true
  gather_facts: false

  vars:
    galaxy_server_dir: "{{ galaxy_root | default('/srv/galaxy/server') }}"
    galaxy_config_file: "{{ galaxy_config_dir | default('/srv/galaxy/config') }}/galaxy.yml"
    galaxy_service_unit: "{{ galaxy_service_name | default('galaxy') }}"

  tasks:
    - name: Check Galaxy server directory
      ansible.builtin.stat:
        path: "{{ galaxy_server_dir }}"
      register: galaxy_server_dir_status

    - name: Check Galaxy run script
      ansible.builtin.stat:
        path: "{{ galaxy_server_dir }}/run.sh"
      register: galaxy_run_script_status

    - name: Check Galaxy Python package directory
      ansible.builtin.stat:
        path: "{{ galaxy_server_dir }}/lib/galaxy"
      register: galaxy_python_package_status

    - name: Check Galaxy config file
      ansible.builtin.stat:
        path: "{{ galaxy_config_file }}"
      register: galaxy_config_file_status

    - name: Check Galaxy systemd unit exists
      ansible.builtin.command:
        cmd: "systemctl list-unit-files {{ galaxy_service_unit }}.service"
      register: galaxy_service_unit_status
      changed_when: false
      failed_when: false

    - name: Check Galaxy service active state
      ansible.builtin.command:
        cmd: "systemctl is-active {{ galaxy_service_unit }}"
      register: galaxy_service_active_status
      changed_when: false
      failed_when: false

    - name: Check Galaxy API endpoint
      ansible.builtin.command:
        cmd: "curl -sf http://127.0.0.1/api/version"
      register: galaxy_api_status
      changed_when: false
      failed_when: false

    - name: Set Galaxy deployment and runtime status
      ansible.builtin.set_fact:
        galaxy_baseline_deployed: >-
          {{
            galaxy_server_dir_status.stat.exists
            and galaxy_config_file_status.stat.exists
            and galaxy_service_unit_status.rc == 0
            and (
              galaxy_run_script_status.stat.exists
              or galaxy_python_package_status.stat.exists
            )
          }}
        galaxy_service_running: >-
          {{
            galaxy_service_active_status.rc == 0
            and galaxy_service_active_status.stdout == "active"
          }}
        galaxy_api_responding: >-
          {{
            galaxy_api_status.rc == 0
          }}

    - name: Set Galaxy redeploy decision
      ansible.builtin.set_fact:
        galaxy_needs_redeploy: >-
          {{
            not (
              galaxy_baseline_deployed | bool
              and galaxy_service_running | bool
              and galaxy_api_responding | bool
            )
          }}

    - name: Report Galaxy baseline status
      ansible.builtin.debug:
        msg:
          - "Galaxy needs redeploy = {{ galaxy_needs_redeploy }}"
          - "Galaxy baseline deployed = {{ galaxy_baseline_deployed }}"
          - "Galaxy service running = {{ galaxy_service_running }}"
          - "Galaxy API responding = {{ galaxy_api_responding }}"
          - "server_dir={{ galaxy_server_dir_status.stat.exists }}"
          - "run_script={{ galaxy_run_script_status.stat.exists }}"
          - "python_package={{ galaxy_python_package_status.stat.exists }}"
          - "config_file={{ galaxy_config_file_status.stat.exists }}"
          - "service_unit_rc={{ galaxy_service_unit_status.rc }}"
          - "service_active={{ galaxy_service_active_status.stdout | default('unknown') }}"
          - "api_rc={{ galaxy_api_status.rc }}"

# ------------------------------------------------------------------------
# PLAY 2A: Redeploy Galaxy baseline if unhealthy
# ------------------------------------------------------------------------
- name: Redeploy Galaxy baseline when unhealthy
  hosts: galaxyservers
  become: true

  vars:
    galaxy_base_dir_resolved: "{{ galaxy_base_dir | default('/srv/galaxy') }}"
    galaxy_var_dir_resolved: "{{ galaxy_mutable_data_dir | default('/srv/galaxy/var') }}"
    galaxy_runtime_user: "{{ galaxy_user | default(galaxy_user_name | default('galaxy')) }}"
    galaxy_runtime_group: "{{ galaxy_group | default(galaxy_user_name | default('galaxy')) }}"

  tasks:
    - name: Ensure Ansible remote tmp directory exists with safe permissions
      ansible.builtin.file:
        path: /tmp/.ansible-root
        state: directory
        owner: root
        group: root
        mode: "1777"
    - name: Ensure Galaxy base directory exists
      ansible.builtin.file:
        path: "{{ galaxy_base_dir_resolved }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: galaxy_needs_redeploy | default(true) | bool

    - name: Ensure Galaxy mutable data directory exists
      ansible.builtin.file:
        path: "{{ galaxy_var_dir_resolved }}"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0755"
      when: galaxy_needs_redeploy | default(true) | bool

    - name: Ensure Galaxy mutable config directory exists
      ansible.builtin.file:
        path: "{{ galaxy_var_dir_resolved }}/config"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0755"
      when: galaxy_needs_redeploy | default(true) | bool

    - name: Repair ownership of Galaxy mutable data tree
      ansible.builtin.file:
        path: "{{ galaxy_var_dir_resolved }}"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        recurse: true
      when: galaxy_needs_redeploy | default(true) | bool

    - name: Run galaxy_deployment role when Galaxy is missing, inactive, or unhealthy
      ansible.builtin.include_role:
        name: galaxy_deployment
      when: galaxy_needs_redeploy | default(true) | bool

    - name: Skip Galaxy deployment because baseline is healthy
      ansible.builtin.debug:
        msg: "Galaxy baseline is healthy. Skipping galaxy_deployment role."
      when: not (galaxy_needs_redeploy | default(true) | bool)

# ------------------------------------------------------------------------
# PLAY 2B: Ensure Galaxy static assets are readable by nginx
# ------------------------------------------------------------------------
- name: Ensure Galaxy static assets are readable by nginx
  hosts: galaxyservers
  become: true
  gather_facts: false

  vars:
    galaxy_server_dir: "{{ galaxy_root | default('/srv/galaxy/server') }}"
    galaxy_static_dir: "{{ galaxy_server_dir }}/static"
    galaxy_runtime_user: "{{ galaxy_user | default(galaxy_user_name | default('galaxy')) }}"
    galaxy_runtime_group: "{{ galaxy_group | default(galaxy_user_name | default('galaxy')) }}"
    nginx_runtime_user: "{{ nginx_user | default('www-data') }}"

  tasks:
    - name: Add nginx user to Galaxy group
      ansible.builtin.user:
        name: "{{ nginx_runtime_user }}"
        groups: "{{ galaxy_runtime_group }}"
        append: true

    - name: Ensure Galaxy server directory is traversable by Galaxy group
      ansible.builtin.file:
        path: "{{ galaxy_server_dir }}"
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0750"
        state: directory

    - name: Ensure Galaxy static directory belongs to Galaxy group
      ansible.builtin.file:
        path: "{{ galaxy_static_dir }}"
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        state: directory
        recurse: true

    - name: Ensure Galaxy static directories are executable/readable
      ansible.builtin.command:
        cmd: "find {{ galaxy_static_dir }} -type d -exec chmod 0755 {} +"
      changed_when: false

    - name: Ensure Galaxy static files are readable
      ansible.builtin.command:
        cmd: "find {{ galaxy_static_dir }} -type f -exec chmod 0644 {} +"
      changed_when: false

    - name: Restart nginx so group membership is refreshed
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      failed_when: false

# ------------------------------------------------------------------------
# PLAY 3: Install/configure ImmuneML overlay from PyPI
# ------------------------------------------------------------------------
- name: Install ImmuneML runtime on Galaxy from PyPI
  hosts: galaxyservers
  become: true

  vars:
    # --------------------------------------------------------------------
    # ImmuneML runtime paths
    # --------------------------------------------------------------------
    immuneml_install_dir_resolved: "{{ immuneml_install_dir | default('/srv/galaxy/immuneml') }}"
    immuneml_venv_resolved: "{{ immuneml_venv | default('/srv/galaxy/immuneml/venv') }}"
    immuneml_reference_dir_resolved: "{{ immuneml_reference_dir | default('/srv/galaxy/var/data/immuneml_references') }}"

    # --------------------------------------------------------------------
    # PyPI version handling
    # --------------------------------------------------------------------
    immuneml_version_resolved: "{{ immuneml_version | default('3.0.27') }}"
    immuneml_upgrade_to_latest_resolved: "{{ immuneml_upgrade_to_latest | default(true) | bool }}"
    immuneml_reinstall_if_present_resolved: "{{ immuneml_reinstall_if_present | default(true) | bool }}"
    immuneml_run_quickstart_resolved: "{{ immuneml_run_quickstart | default(false) | bool }}"

    # --------------------------------------------------------------------
    # Runtime user
    # --------------------------------------------------------------------
    galaxy_runtime_user: "{{ galaxy_user | default(galaxy_user_name | default('galaxy')) }}"
    galaxy_runtime_group: "{{ galaxy_group | default(galaxy_user_name | default('galaxy')) }}"

  tasks:
    - name: Announce ImmuneML integration phase
      ansible.builtin.debug:
        msg:
          - "Galaxy baseline is ready. Starting ImmuneML runtime integration..."
          - "ImmuneML source: PyPI"
          - "Pinned version: {{ immuneml_version_resolved }}"
          - "Upgrade to latest: {{ immuneml_upgrade_to_latest_resolved }}"
          - "Reinstall if venv exists: {{ immuneml_reinstall_if_present_resolved }}"

    - name: Ensure ImmuneML system dependencies are installed
      ansible.builtin.apt:
        name:
          - python3
          - python3-dev
          - python3-venv
          - python3-pip
          - build-essential
          - gcc
          - g++
          - gfortran
          - git
          - curl
          - libblas-dev
          - liblapack-dev
          - libhdf5-dev
          - libgfortran5
        state: present
        update_cache: true

    - name: Create ImmuneML install directory
      ansible.builtin.file:
        path: "{{ immuneml_install_dir_resolved }}"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0755"

    - name: Create ImmuneML reference directory
      ansible.builtin.file:
        path: "{{ immuneml_reference_dir_resolved }}"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0755"

    - name: Check whether ImmuneML virtual environment exists
      ansible.builtin.stat:
        path: "{{ immuneml_venv_resolved }}/bin/python"
      register: immuneml_venv_python_status

    - name: Remove existing ImmuneML virtual environment before reinstall
      ansible.builtin.file:
        path: "{{ immuneml_venv_resolved }}"
        state: absent
      when:
        - immuneml_reinstall_if_present_resolved
        - immuneml_venv_python_status.stat.exists

    - name: Create ImmuneML Python virtual environment
      ansible.builtin.command:
        cmd: "python3 -m venv {{ immuneml_venv_resolved }}"
        creates: "{{ immuneml_venv_resolved }}/bin/activate"
      become_user: "{{ galaxy_runtime_user }}"

    - name: Upgrade pip, wheel, and modern setuptools in ImmuneML virtual environment
      ansible.builtin.pip:
        name:
          - pip
          - wheel
          - "setuptools>=75.3.0"
        state: latest
        virtualenv: "{{ immuneml_venv_resolved }}"
      become_user: "{{ galaxy_runtime_user }}"

    - name: Install immuneML runtime dependency stack from PyPI
      ansible.builtin.pip:
        name:
          - "numpy==1.26.4"
          - "scipy==1.12.0"
          - "pandas>=2.1.0"
          - "PyYAML>=5.3"
          - "scikit-learn"
          - "matplotlib"
          - "editdistance"
          - "regex"
          - "tzlocal"
          - "airr>=1.5.1"
          - "pystache"
          - "dill>=0.3"
          - "plotly"
          - "matplotlib-venn"
          - "bionumpy>=1.0.12"
          - "umap-learn"
          - "olga>=1.2.4"
          - "psutil"
          - "kaleido"
          - "logomaker"
          - "python-glmnet==2.6.1"
        virtualenv: "{{ immuneml_venv_resolved }}"
        extra_args: "--upgrade"
      become_user: "{{ galaxy_runtime_user }}"

    - name: Install latest ImmuneML package from PyPI without dependency resolver
      ansible.builtin.pip:
        name: "immuneML"
        state: latest
        virtualenv: "{{ immuneml_venv_resolved }}"
        extra_args: "--upgrade --no-deps"
      become_user: "{{ galaxy_runtime_user }}"
      when: immuneml_upgrade_to_latest_resolved

    - name: Install pinned ImmuneML package from PyPI without dependency resolver
      ansible.builtin.pip:
        name: "immuneML=={{ immuneml_version_resolved }}"
        virtualenv: "{{ immuneml_venv_resolved }}"
        extra_args: "--upgrade --no-deps"
      become_user: "{{ galaxy_runtime_user }}"
      when: not immuneml_upgrade_to_latest_resolved

    - name: Create immune-ml command symlink
      ansible.builtin.file:
        src: "{{ immuneml_venv_resolved }}/bin/immune-ml"
        dest: /usr/local/bin/immune-ml
        state: link
        force: true

    - name: Create immune-ml-quickstart command symlink
      ansible.builtin.file:
        src: "{{ immuneml_venv_resolved }}/bin/immune-ml-quickstart"
        dest: /usr/local/bin/immune-ml-quickstart
        state: link
        force: true

    - name: Validate ImmuneML CLI
      ansible.builtin.command:
        cmd: "{{ immuneml_venv_resolved }}/bin/immune-ml -h"
      changed_when: false

    - name: Check installed ImmuneML package version
      ansible.builtin.command:
        cmd: "{{ immuneml_venv_resolved }}/bin/python -m pip show immuneML"
      register: immuneml_installed_package_info
      changed_when: false

    - name: Report installed ImmuneML package information
      ansible.builtin.debug:
        msg: "{{ immuneml_installed_package_info.stdout_lines }}"

    - name: Optionally run ImmuneML quickstart
      ansible.builtin.command:
        cmd: "{{ immuneml_venv_resolved }}/bin/immune-ml-quickstart {{ immuneml_install_dir_resolved }}/quickstart_results"
      become_user: "{{ galaxy_runtime_user }}"
      args:
        creates: "{{ immuneml_install_dir_resolved }}/quickstart_results"
      when: immuneml_run_quickstart_resolved
# ------------------------------------------------------------------------
# PLAY 4: Register official ImmuneML Galaxy tools in Avant-style menu
# ------------------------------------------------------------------------
- name: Register official ImmuneML Galaxy tools in Avant-style menu
  hosts: galaxyservers
  become: true

  vars:
    # --------------------------------------------------------------------
    # Galaxy paths
    # --------------------------------------------------------------------
    galaxy_tool_dir_resolved: "{{ galaxy_tool_dir | default('/srv/galaxy/server/tools') }}"
    galaxy_config_dir_resolved: "{{ galaxy_config_dir | default('/srv/galaxy/config') }}"
    galaxy_mutable_config_dir_resolved: "{{ galaxy_mutable_config_dir | default('/srv/galaxy/mutable/config') }}"
    galaxy_service_unit: "{{ galaxy_service_name | default('galaxy') }}"

    galaxy_tool_conf: "{{ galaxy_config_dir_resolved }}/tool_conf.xml"
    galaxy_config_file: "{{ galaxy_config_dir_resolved }}/galaxy.yml"
    galaxy_datatypes_conf: "{{ galaxy_config_dir_resolved }}/datatypes_conf.xml"

    # --------------------------------------------------------------------
    # Official immuneML Galaxy wrapper source
    # --------------------------------------------------------------------
    immuneml_tools_repo_resolved: "{{ immuneml_tools_repo_url | default('https://github.com/uio-bmi/immuneml_tools.git') }}"
    immuneml_tools_version_resolved: "{{ immuneml_tools_version | default('main') }}"
    immuneml_tools_source_dir_resolved: "{{ immuneml_tools_source_dir | default('/srv/galaxy/immuneml_tools_source') }}"
    immuneml_tools_force_refresh_resolved: "{{ immuneml_tools_force_refresh | default(true) | bool }}"

    immuneml_tool_dir: "{{ galaxy_tool_dir_resolved }}/immuneml"

    # --------------------------------------------------------------------
    # Runtime user
    # --------------------------------------------------------------------
    galaxy_runtime_user: "{{ galaxy_user | default(galaxy_user_name | default('galaxy')) }}"
    galaxy_runtime_group: "{{ galaxy_group | default(galaxy_user_name | default('galaxy')) }}"
      #--------------------------------------------------------------------
    # immuneML welcome/static assets from GitHub
    # --------------------------------------------------------------------
    galaxy_server_dir_resolved: "{{ galaxy_root | default('/srv/galaxy/server') }}"
    galaxy_static_dir_resolved: "{{ galaxy_server_dir_resolved }}/static"
    galaxy_welcome_file: "{{ galaxy_static_dir_resolved }}/welcome.html"

    immuneml_welcome_repo_url_resolved: "{{ immuneml_welcome_repo_url | default('https://github.com/yehiafarag/immuneml-galaxy-playbook.git') }}"
    immuneml_welcome_repo_version_resolved: "{{ immuneml_welcome_repo_version | default('main') }}"
    immuneml_welcome_source_dir_resolved: "{{ immuneml_welcome_source_dir | default('/srv/galaxy/immuneml_welcome_source') }}"
    immuneml_welcome_folder_resolved: "{{ immuneml_welcome_folder | default('files') }}"
    immuneml_welcome_html_resolved: "{{ immuneml_welcome_html | default('welcome_immuneml.html') }}"
    immuneml_welcome_force_refresh_resolved: "{{ immuneml_welcome_force_refresh | default(true) | bool }}"
  tasks:
    - name: Announce ImmuneML Galaxy tool registration
      ansible.builtin.debug:
        msg:
          - "Registering official immuneML Galaxy tools in Avant-style menu."
          - "Tool source repo: {{ immuneml_tools_repo_resolved }}"
          - "Tool source version: {{ immuneml_tools_version_resolved }}"
          - "Tool source directory: {{ immuneml_tools_source_dir_resolved }}"
          - "Galaxy tool directory: {{ immuneml_tool_dir }}"
          - "Galaxy tool_conf.xml: {{ galaxy_tool_conf }}"

    - name: Ensure git is installed for fetching immuneML Galaxy tools
      ansible.builtin.apt:
        name:
          - git
        state: present
        update_cache: true

    - name: Ensure immuneML Galaxy tools source parent directory exists
      ansible.builtin.file:
        path: "{{ immuneml_tools_source_dir_resolved | dirname }}"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0755"

    - name: Remove existing immuneML Galaxy tools source checkout before refresh
      ansible.builtin.file:
        path: "{{ immuneml_tools_source_dir_resolved }}"
        state: absent
      when: immuneml_tools_force_refresh_resolved

    - name: Clone official immuneML Galaxy tools repository
      ansible.builtin.git:
        repo: "{{ immuneml_tools_repo_resolved }}"
        dest: "{{ immuneml_tools_source_dir_resolved }}"
        version: "{{ immuneml_tools_version_resolved }}"
        force: true
        update: true
      become_user: "{{ galaxy_runtime_user }}"

    - name: Remove old immuneML Galaxy tool directory before installing official wrappers
      ansible.builtin.file:
        path: "{{ immuneml_tool_dir }}"
        state: absent

    - name: Ensure Galaxy immuneML tool directory exists
      ansible.builtin.file:
        path: "{{ immuneml_tool_dir }}"
        state: directory
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0755"

    - name: Copy official immuneML Galaxy tools into Galaxy tools directory
      ansible.builtin.copy:
        src: "{{ immuneml_tools_source_dir_resolved }}/"
        dest: "{{ immuneml_tool_dir }}/"
        remote_src: true
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: preserve

    - name: Find immuneML Galaxy XML tool wrappers
      ansible.builtin.find:
        paths: "{{ immuneml_tool_dir }}"
        patterns: "*.xml"
        file_type: file
      register: immuneml_tool_xml_find

    - name: Build immuneML XML filename list
      ansible.builtin.set_fact:
        immuneml_tool_xml_files: >-
          {{
            immuneml_tool_xml_find.files
            | map(attribute='path')
            | map('basename')
            | reject('equalto', 'prod_macros.xml')
            | reject('equalto', 'macros.xml')
            | reject('equalto', 'datatypes_conf.xml')
            | list
            | sort
          }}

    - name: Report immuneML Galaxy tool wrappers found
      ansible.builtin.debug:
        msg:
          - "Found immuneML Galaxy wrappers:"
          - "{{ immuneml_tool_xml_files }}"

    - name: Fail if no immuneML Galaxy XML wrappers were found
      ansible.builtin.fail:
        msg: "No immuneML Galaxy XML wrappers were found in {{ immuneml_tool_dir }}"
      when: immuneml_tool_xml_files | length == 0

    - name: Check Galaxy tool_conf.xml
      ansible.builtin.stat:
        path: "{{ galaxy_tool_conf }}"
      register: galaxy_tool_conf_status

    - name: Create Avant-style Galaxy tool_conf.xml if missing
      ansible.builtin.copy:
        dest: "{{ galaxy_tool_conf }}"
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0644"
        content: |
          <?xml version="1.0"?>
          <toolbox monitor="true">
          </toolbox>
      when: not galaxy_tool_conf_status.stat.exists

    - name: Register immuneML tools in Avant-style Galaxy toolbox
      ansible.builtin.blockinfile:
          path: "{{ galaxy_tool_conf }}"
          marker: "<!-- {mark} immuneML tools managed by Ansible -->"
          insertbefore: "</toolbox>"
          block: |
            block: |
            <!-- Data import and simulation -->
            <section id="immuneml_data_import_and_simulation" name="Data import and simulation">
            {% if 'immuneml_dataset.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_dataset.xml" />
            {% endif %}
            {% if 'immuneml_simulate_random_dummy_dataset.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_simulate_random_dummy_dataset.xml" />
            {% endif %}
            {% if 'immuneml_simulate_ligo_events.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_simulate_ligo_events.xml" />
            {% endif %}
            <tool file="data_source/upload.xml" />
            </section>
            
            <!-- Fit classifiers -->
            <section id="immuneml_fit_classifiers" name="Fit classifiers">
            {% if 'immuneml_train_repertoire_classifier.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_train_repertoire_classifier.xml" />
            {% endif %}
            {% if 'immuneml_train_receptor_classifier.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_train_receptor_classifier.xml" />
            {% endif %}
            {% if 'immuneml_train_ml_model.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_train_ml_model.xml" />
            {% endif %}
            {% if 'immuneml_apply_ml_model.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_apply_ml_model.xml" />
            {% endif %}
            </section>
            
            <!-- Fit generative models -->
            <section id="immuneml_fit_generative_models" name="Fit generative models">
            {% if 'immuneml_train_gen_model.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_train_gen_model.xml" />
            {% endif %}
            {% if 'immuneml_apply_gen_model.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_apply_gen_model.xml" />
            {% endif %}
            </section>
            
            <!-- Other analyses -->
            <section id="immuneml_other_analyses" name="Other analyses">
            {% if 'immuneml_clustering.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_clustering.xml" />
            {% endif %}
            {% if 'immuneml_yaml.xml' in immuneml_tool_xml_files %}
            <tool file="immuneml/immuneml_yaml.xml" />
            {% endif %}
            </section>
          

    - name: Ensure Galaxy uses managed tool_conf.xml
      ansible.builtin.lineinfile:
        path: "{{ galaxy_config_file }}"
        regexp: '^\s*tool_config_file:.*$'
        line: "    tool_config_file: {{ galaxy_tool_conf }}"
        insertafter: '^galaxy:\s*$'
        backup: true

    - name: Check Galaxy datatypes_conf.xml
      ansible.builtin.stat:
        path: "{{ galaxy_datatypes_conf }}"
      register: galaxy_datatypes_conf_status

    - name: Create minimal Galaxy datatypes_conf.xml if missing
      ansible.builtin.copy:
        dest: "{{ galaxy_datatypes_conf }}"
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0644"
        content: |
          <?xml version="1.0"?>
          <datatypes>
              <registration>
              </registration>
          </datatypes>
      when: not galaxy_datatypes_conf_status.stat.exists

    - name: Register immuneML receptors datatype
      ansible.builtin.blockinfile:
        path: "{{ galaxy_datatypes_conf }}"
        marker: "<!-- {mark} immuneML datatypes managed by Ansible -->"
        insertbefore: "</registration>"
        block: |
          <datatype extension="immuneml_receptors" type="galaxy.datatypes.text:Html" subclass="True"/>

    - name: Ensure Galaxy uses managed datatypes_conf.xml
      ansible.builtin.lineinfile:
        path: "{{ galaxy_config_file }}"
        regexp: '^\s*datatypes_config_file:.*$'
        line: "    datatypes_config_file: {{ galaxy_datatypes_conf }}"
        insertafter: '^galaxy:\s*$'
        backup: true

    - name: Remove cached integrated tool panel
      ansible.builtin.file:
        path: "{{ galaxy_mutable_config_dir_resolved }}/integrated_tool_panel.xml"
        state: absent
      failed_when: false




    - name: Remove existing immuneML welcome source checkout before refresh
      ansible.builtin.file:
          path: "{{ immuneml_welcome_source_dir_resolved }}"
          state: absent
      when: immuneml_welcome_force_refresh_resolved

    - name: Clone immuneML welcome/static assets repository
      ansible.builtin.git:
              repo: "{{ immuneml_welcome_repo_url_resolved }}"
              dest: "{{ immuneml_welcome_source_dir_resolved }}"
              version: "{{ immuneml_welcome_repo_version_resolved }}"
              force: true
              update: true
      become_user: "{{ galaxy_runtime_user }}"

    - name: Check immuneML welcome assets folder exists
      ansible.builtin.stat:
              path: "{{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}"
      register: immuneml_welcome_folder_status

    - name: Fail if immuneML welcome assets folder is missing
      ansible.builtin.fail:
              msg: >-
                Welcome assets folder was not found at
                {{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}.
      when: not immuneml_welcome_folder_status.stat.exists

    - name: Check immuneML welcome HTML file exists
      ansible.builtin.stat:
              path: "{{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}/{{ immuneml_welcome_html_resolved }}"
      register: immuneml_welcome_html_status

    - name: Fail if immuneML welcome HTML file is missing
      ansible.builtin.fail:
              msg: >-
                Welcome HTML file was not found at
                {{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}/{{ immuneml_welcome_html_resolved }}.
      when: not immuneml_welcome_html_status.stat.exists

    - name: Ensure Galaxy static directory exists
      ansible.builtin.file:
              path: "{{ galaxy_static_dir_resolved }}"
              state: directory
              owner: "{{ galaxy_runtime_user }}"
              group: "{{ galaxy_runtime_group }}"
              mode: "0755"

    - name: Back up existing Galaxy welcome.html if present
      ansible.builtin.copy:
              src: "{{ galaxy_welcome_file }}"
              dest: "{{ galaxy_welcome_file }}.bak"
              remote_src: true
              owner: "{{ galaxy_runtime_user }}"
              group: "{{ galaxy_runtime_group }}"
              mode: "0644"
              force: false
      failed_when: false

    - name: Delete existing Galaxy welcome.html
      ansible.builtin.file:
          path: "{{ galaxy_static_dir_resolved }}/welcome.html"
          state: absent

    - name: Copy immuneML welcome assets into Galaxy static directory
      ansible.builtin.copy:
              src: "{{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}/"
              dest: "{{ galaxy_static_dir_resolved }}"
              remote_src: true
              owner: "{{ galaxy_runtime_user }}"
              group: "{{ galaxy_runtime_group }}"
              mode: "0644"
              force: true

#
#
    - name: Replace Galaxy welcome.html with immuneML welcome page
      ansible.builtin.copy:
        src: "{{ galaxy_static_dir_resolved }}/{{ immuneml_welcome_html_resolved }}"
        dest: "{{ galaxy_static_dir_resolved }}/welcome.html"
        remote_src: true
        owner: "{{ galaxy_runtime_user }}"
        group: "{{ galaxy_runtime_group }}"
        mode: "0644"
        force: true

    - name: Install immuneML welcome page as welcome.html.sample too
      ansible.builtin.copy:
          src: "{{ galaxy_static_dir_resolved }}/{{ immuneml_welcome_html_resolved }}"
          dest: "{{ galaxy_static_dir_resolved }}/welcome.html.sample"
          remote_src: true
          owner: "{{ galaxy_runtime_user }}"
          group: "{{ galaxy_runtime_group }}"
          mode: "0644"
          force: true


    - name: Ensure nginx can traverse Galaxy directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /srv
        - /srv/galaxy
        - /srv/galaxy/server

    - name: Ensure Galaxy static directory is traversable by nginx
      ansible.builtin.file:
        path: /srv/galaxy/server/static
        state: directory
        mode: "0755"

    - name: Ensure Galaxy static directories are executable/readable
      ansible.builtin.command:
        cmd: "find /srv/galaxy/server/static -type d -exec chmod 0755 {} +"
      changed_when: false

    - name: Ensure Galaxy static files are readable by nginx
      ansible.builtin.command:
        cmd: "find /srv/galaxy/server/static -type f -exec chmod 0644 {} +"
      changed_when: false
    - name: Restart nginx after welcome page replacement
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      failed_when: false



    - name: Restart Galaxy after registering immuneML tools
      ansible.builtin.systemd:
        name: "{{ galaxy_service_unit }}"
        state: restarted
        daemon_reload: true

    - name: Wait 300 seconds for Galaxy to stabilise after restart
      ansible.builtin.pause:
        seconds: 300

    - name: Confirm Galaxy API responds after stabilisation wait
      ansible.builtin.uri:
        url: "http://127.0.0.1/api/version"
        method: GET
        status_code: 200
      register: galaxy_api_after_restart
      retries: 30
      delay: 10
      until: galaxy_api_after_restart.status == 200

    - name: Report ImmuneML Galaxy tool registration complete
      ansible.builtin.debug:
        msg:
          - "ImmuneML Galaxy tools registered in Avant-style menu."
          - "Refresh Galaxy UI and search for immuneML."
          - "Workflows / All workflows is handled by the Galaxy UI."
          - "Registered wrappers found on disk: {{ immuneml_tool_xml_files }}"