---
# ========================================================================
# IMMUNEML GALAXY ORCHESTRATOR
# ========================================================================

# ------------------------------------------------------------------------
# PLAY 1: Check whether Galaxy baseline is deployed and healthy
# ------------------------------------------------------------------------
- name: Check whether Galaxy baseline is deployed and healthy
  hosts: galaxyservers
  become: true
  gather_facts: false

  tasks:
    - name: Check Galaxy server directory
      ansible.builtin.stat:
        path: "{{ galaxy_server_dir_resolved }}"
      register: galaxy_server_dir_resolved_status

    - name: Check Galaxy run script
      ansible.builtin.stat:
        path: "{{ galaxy_server_dir_resolved }}/run.sh"
      register: galaxy_run_script_status

    - name: Check Galaxy Python package directory
      ansible.builtin.stat:
        path: "{{ galaxy_server_dir_resolved }}/lib/galaxy"
      register: galaxy_python_package_status

    - name: Check Galaxy config file
      ansible.builtin.stat:
        path: "{{ galaxy_config_file_resolved }}"
      register: galaxy_config_file_status

    - name: Check Galaxy systemd unit exists
      ansible.builtin.command:
        cmd: "systemctl list-unit-files {{ galaxy_service_unit_resolved }}.service"
      register: galaxy_service_unit_status
      changed_when: false
      failed_when: false

    - name: Check Galaxy service active state
      ansible.builtin.command:
        cmd: "systemctl is-active {{ galaxy_service_unit_resolved }}"
      register: galaxy_service_active_status
      changed_when: false
      failed_when: false

    - name: Check Galaxy API endpoint
      ansible.builtin.command:
        cmd: "curl -sf http://127.0.0.1/api/version"
      register: galaxy_api_status
      changed_when: false
      failed_when: false

    - name: Check Galaxy PostgreSQL database_connection
      ansible.builtin.command:
        cmd: "grep -nE '^\\s*database_connection:\\s*postgresql://' {{ galaxy_config_file_resolved }}"
      register: galaxy_database_connection_status
      changed_when: false
      failed_when: false
      when: galaxy_config_file_status.stat.exists

    - name: Set Galaxy baseline status facts
      ansible.builtin.set_fact:
        galaxy_baseline_deployed: >-
          {{
            galaxy_server_dir_resolved_status.stat.exists
            and galaxy_config_file_status.stat.exists
            and galaxy_service_unit_status.rc == 0
            and (
              galaxy_run_script_status.stat.exists
              or galaxy_python_package_status.stat.exists
            )
          }}
        galaxy_service_running: >-
          {{
            galaxy_service_active_status.rc == 0
            and galaxy_service_active_status.stdout == "active"
          }}
        galaxy_api_responding: >-
          {{
            galaxy_api_status.rc == 0
          }}
        galaxy_postgresql_configured: >-
          {{
            galaxy_config_file_status.stat.exists
            and galaxy_database_connection_status is defined
            and galaxy_database_connection_status.rc == 0
          }}

    - name: Set Galaxy baseline attention flag
      ansible.builtin.set_fact:
        galaxy_needs_baseline_attention: >-
          {{
            not (
              galaxy_baseline_deployed | bool
              and galaxy_service_running | bool
              and galaxy_api_responding | bool
              and galaxy_postgresql_configured | bool
            )
          }}

    - name: Report Galaxy baseline status
      ansible.builtin.debug:
        msg:
          - "Galaxy needs baseline attention = {{ galaxy_needs_baseline_attention }}"
          - "Galaxy baseline deployed = {{ galaxy_baseline_deployed }}"
          - "Galaxy service running = {{ galaxy_service_running }}"
          - "Galaxy API responding = {{ galaxy_api_responding }}"
          - "Galaxy PostgreSQL configured = {{ galaxy_postgresql_configured }}"
          - "server_dir={{ galaxy_server_dir_resolved_status.stat.exists }}"
          - "run_script={{ galaxy_run_script_status.stat.exists }}"
          - "python_package={{ galaxy_python_package_status.stat.exists }}"
          - "config_file={{ galaxy_config_file_status.stat.exists }}"
          - "service_unit_rc={{ galaxy_service_unit_status.rc }}"
          - "service_active={{ galaxy_service_active_status.stdout | default('unknown') }}"
          - "api_rc={{ galaxy_api_status.rc }}"
          - "database_connection={{ galaxy_database_connection_status.stdout | default('missing') }}"

# ------------------------------------------------------------------------
# PLAY 2: Deploy Galaxy baseline only when baseline needs attention
# ------------------------------------------------------------------------
- name: Deploy Galaxy baseline only when baseline needs attention
  hosts: galaxyservers
  become: true

  tasks:
    - name: Run galaxy_deployment role when Galaxy baseline needs attention
      ansible.builtin.include_role:
        name: galaxy_deployment
      when: galaxy_needs_baseline_attention | default(true) | bool

    - name: Skip Galaxy deployment because baseline is healthy
      ansible.builtin.debug:
        msg: "Galaxy baseline is healthy. Skipping galaxy_deployment role."
      when: not (galaxy_needs_baseline_attention | default(true) | bool)

# ------------------------------------------------------------------------
# PLAY 3: Configure immuneML Conda/Bioconda runtime strategy
# ------------------------------------------------------------------------
- name: Configure immuneML runtime strategy
  hosts: galaxyservers
  become: true
  gather_facts: false

  tasks:
    - name: Report immuneML runtime strategy
      ansible.builtin.debug:
        msg:
          - "immuneML runtime strategy = {{ immuneml_runtime_strategy_resolved }}"
          - "Galaxy tools will use Conda/Bioconda through wrapper requirements."
          - "Standalone pip CLI runtime enabled = {{ immuneml_cli_runtime_enabled_resolved }}"
          - "Galaxy Conda prefix = {{ galaxy_conda_prefix_resolved }}"
          - "Dependency resolver config = {{ galaxy_dependency_resolvers_conf }}"

    - name: Assert Conda runtime strategy is selected
      ansible.builtin.assert:
        that:
          - immuneml_runtime_strategy_resolved == "conda"
        fail_msg: >-
          This playbook expects immuneml_runtime_strategy: conda.
          Do not use pip runtime for Galaxy tool execution.
        success_msg: "immuneML Conda/Bioconda runtime strategy selected."

    - name: Ensure Galaxy config directory exists
      ansible.builtin.file:
        path: "{{ galaxy_config_dir_resolved }}"
        state: directory
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0755"
      when: galaxy_enable_conda_dependencies_resolved

    - name: Ensure Galaxy dependency resolver config exists
      ansible.builtin.template:
        src: templates/dependency_resolvers_conf.xml.j2
        dest: "{{ galaxy_dependency_resolvers_conf }}"
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0644"
      when: galaxy_enable_conda_dependencies_resolved

    - name: Ensure Galaxy uses dependency_resolvers_conf.xml
      ansible.builtin.lineinfile:
        path: "{{ galaxy_config_file_resolved }}"
        regexp: '^\s*dependency_resolvers_config_file:.*$'
        line: "    dependency_resolvers_config_file: {{ galaxy_dependency_resolvers_conf }}"
        insertafter: '^galaxy:\s*$'
        backup: true
      when: galaxy_enable_conda_dependencies_resolved

    - name: Verify Galaxy dependency resolver config contains Conda resolver
      ansible.builtin.command:
        cmd: "grep -n '<conda' {{ galaxy_dependency_resolvers_conf }}"
      register: galaxy_conda_resolver_check
      changed_when: false
      when: galaxy_enable_conda_dependencies_resolved

    - name: Report Galaxy Conda dependency resolver
      ansible.builtin.debug:
        msg:
          - "Galaxy Conda dependency resolver is configured."
          - "{{ galaxy_conda_resolver_check.stdout | default('Conda resolver check skipped') }}"
      when: galaxy_enable_conda_dependencies_resolved

# ------------------------------------------------------------------------
# PLAY 4: Register official immuneML Galaxy tools menu
# ------------------------------------------------------------------------
- name: Register official immuneML Galaxy tools menu
  hosts: galaxyservers
  become: true
  gather_facts: false

  tasks:
    - name: Announce immuneML Galaxy tool registration
      ansible.builtin.debug:
        msg:
          - "Registering official immuneML Galaxy tools menu."
          - "Tool source repo: {{ immuneml_tools_repo_resolved }}"
          - "Tool source version: {{ immuneml_tools_version_resolved }}"
          - "Tool source directory: {{ immuneml_tools_source_dir_resolved }}"
          - "Galaxy tool directory: {{ immuneml_tool_dir }}"
          - "Galaxy tool_conf.xml: {{ galaxy_tool_conf }}"

    - name: Ensure git is installed
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true

    - name: Ensure immuneML Galaxy tools source parent directory exists
      ansible.builtin.file:
        path: "{{ immuneml_tools_source_dir_resolved | dirname }}"
        state: directory
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0755"

    - name: Remove existing immuneML Galaxy tools source checkout before refresh
      ansible.builtin.file:
        path: "{{ immuneml_tools_source_dir_resolved }}"
        state: absent
      when: immuneml_tools_force_refresh_resolved

    - name: Clone official immuneML Galaxy tools repository
      ansible.builtin.git:
        repo: "{{ immuneml_tools_repo_resolved }}"
        dest: "{{ immuneml_tools_source_dir_resolved }}"
        version: "{{ immuneml_tools_version_resolved }}"
        force: true
        update: true
      become_user: "{{ galaxy_runtime_user_resolved }}"

    - name: Remove old immuneML Galaxy tool directory before installing wrappers
      ansible.builtin.file:
        path: "{{ immuneml_tool_dir }}"
        state: absent

    - name: Ensure Galaxy immuneML tool directory exists
      ansible.builtin.file:
        path: "{{ immuneml_tool_dir }}"
        state: directory
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0755"

    - name: Copy official immuneML Galaxy tools into Galaxy tools directory
      ansible.builtin.copy:
        src: "{{ immuneml_tools_source_dir_resolved }}/"
        dest: "{{ immuneml_tool_dir }}/"
        remote_src: true
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: preserve

    - name: Remove previous experimental immuneML PATH patch from wrappers
      ansible.builtin.shell: |
        set -euo pipefail

        python3 - <<'PY'
        from pathlib import Path
        import re

        tool_dir = Path("{{ immuneml_tool_dir }}")

        patterns = [
            r'export PATH="\\?\$\{CONDA_PREFIX\}/bin:\\?\$\{PATH\}"\s*(?:&amp;amp;&amp;amp;|&amp;&amp;|&&)\s*immune-ml\s+',
            r'export PATH="\$\{CONDA_PREFIX\}/bin:\$\{PATH\}"\s*(?:&amp;amp;&amp;amp;|&amp;&amp;|&&)\s*immune-ml\s+',
        ]

        for wrapper in tool_dir.glob("*.xml"):
            text = wrapper.read_text()
            original = text

            text = text.replace("&amp;amp;&amp;amp;", "&amp;&amp;")

            for pattern in patterns:
                text = re.sub(pattern, "immune-ml ", text)

            if text != original:
                wrapper.write_text(text)
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure immuneML wrappers declare compatible setuptools dependency
      ansible.builtin.shell: |
        set -euo pipefail

        python3 - <<'PY'
        from pathlib import Path
        import re

        macros = Path("{{ immuneml_prod_macros_path }}")
        setuptools_version = "{{ immuneml_setuptools_version | default('80.9.0') }}"

        if not macros.exists():
            raise SystemExit(f"Missing prod_macros.xml: {macros}")

        text = macros.read_text()

        text = re.sub(
            r'\s*<requirement[^>]*type="package"[^>]*>setuptools</requirement>\n?',
            '\n',
            text
        )

        insert_line = f'            <requirement type="package" version="{setuptools_version}">setuptools</requirement>\n'

        if "</requirements>" not in text:
            raise SystemExit("Could not find </requirements> in prod_macros.xml")

        text = text.replace("</requirements>", insert_line + "        </requirements>", 1)
        macros.write_text(text)
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Check whether immuneML YAML wrapper exists
      ansible.builtin.stat:
        path: "{{ immuneml_tool_dir }}/immuneml_yaml.xml"
      register: immuneml_yaml_wrapper_status

    - name: Allow YAML runner to accept txt, yaml, and yml Galaxy datatypes
      ansible.builtin.replace:
        path: "{{ immuneml_tool_dir }}/immuneml_yaml.xml"
        regexp: 'format="txt"'
        replace: 'format="txt,yaml,yml"'
      when: immuneml_yaml_wrapper_status.stat.exists

    - name: Check whether immuneML prod_macros.xml exists
      ansible.builtin.stat:
        path: "{{ immuneml_prod_macros_path }}"
      register: immuneml_prod_macros_status

    - name: Show immuneML prod_macros.xml version and requirement lines if present
      ansible.builtin.command:
        cmd: "grep -nE 'VERSION|requirement.*immuneml|requirement.*immuneML|requirement.*setuptools' {{ immuneml_prod_macros_path }}"
      register: immuneml_prod_macros_version_lines
      changed_when: false
      failed_when: false
      when: immuneml_prod_macros_status.stat.exists

    - name: Report immuneML prod_macros.xml version and requirement lines
      ansible.builtin.debug:
        msg: "{{ immuneml_prod_macros_version_lines.stdout_lines | default(['prod_macros.xml not present or no version lines found']) }}"

    - name: Find immuneML Galaxy XML tool wrappers
      ansible.builtin.find:
        paths: "{{ immuneml_tool_dir }}"
        patterns: "*.xml"
        file_type: file
      register: immuneml_tool_xml_find

    - name: Build immuneML XML filename list
      ansible.builtin.set_fact:
        immuneml_tool_xml_files: >-
          {{
            immuneml_tool_xml_find.files
            | map(attribute='path')
            | map('basename')
            | reject('equalto', 'prod_macros.xml')
            | reject('equalto', 'macros.xml')
            | reject('equalto', 'datatypes_conf.xml')
            | list
            | sort
          }}

    - name: Report immuneML Galaxy tool wrappers found
      ansible.builtin.debug:
        msg:
          - "Found immuneML Galaxy wrappers:"
          - "{{ immuneml_tool_xml_files }}"

    - name: Fail if no immuneML Galaxy XML wrappers were found
      ansible.builtin.fail:
        msg: "No immuneML Galaxy XML wrappers were found in {{ immuneml_tool_dir }}"
      when: immuneml_tool_xml_files | length == 0

    - name: Check Galaxy tool_conf.xml
      ansible.builtin.stat:
        path: "{{ galaxy_tool_conf }}"
      register: galaxy_tool_conf_status

    - name: Create Galaxy tool_conf.xml if missing
      ansible.builtin.template:
        src: templates/tool_conf_empty.xml.j2
        dest: "{{ galaxy_tool_conf }}"
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0644"
      when: not galaxy_tool_conf_status.stat.exists

    - name: Register immuneML tools in Galaxy toolbox
      ansible.builtin.blockinfile:
        path: "{{ galaxy_tool_conf }}"
        marker: "<!-- {mark} immuneML tools managed by Ansible -->"
        insertbefore: "</toolbox>"
        block: "{{ lookup('ansible.builtin.template', 'templates/immuneml_toolbox_block.j2') }}"

    - name: Ensure Galaxy uses managed tool_conf.xml
      ansible.builtin.lineinfile:
        path: "{{ galaxy_config_file_resolved }}"
        regexp: '^\s*tool_config_file:.*$'
        line: "    tool_config_file: {{ galaxy_tool_conf }}"
        insertafter: '^galaxy:\s*$'
        backup: true

    - name: Check Galaxy built-in datatypes_conf.xml.sample
      ansible.builtin.stat:
        path: "{{ galaxy_builtin_datatypes_conf }}"
      register: galaxy_builtin_datatypes_conf_status

    - name: Fail if Galaxy built-in datatypes_conf.xml.sample is missing
      ansible.builtin.fail:
        msg: "Galaxy built-in datatypes sample file is missing at {{ galaxy_builtin_datatypes_conf }}"
      when: not galaxy_builtin_datatypes_conf_status.stat.exists

    - name: Create managed Galaxy datatypes_conf.xml from Galaxy sample
      ansible.builtin.copy:
        src: "{{ galaxy_builtin_datatypes_conf }}"
        dest: "{{ galaxy_datatypes_conf }}"
        remote_src: true
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0644"
        force: true

    - name: Check whether yaml datatype is already registered
      ansible.builtin.command:
        cmd: "grep -q 'extension=\"yaml\"' {{ galaxy_datatypes_conf }}"
      register: galaxy_yaml_datatype_check
      changed_when: false
      failed_when: false

    - name: Check whether yml datatype is already registered
      ansible.builtin.command:
        cmd: "grep -q 'extension=\"yml\"' {{ galaxy_datatypes_conf }}"
      register: galaxy_yml_datatype_check
      changed_when: false
      failed_when: false

    - name: Register yaml datatype if missing
      ansible.builtin.blockinfile:
        path: "{{ galaxy_datatypes_conf }}"
        marker: "<!-- {mark} YAML datatype managed by Ansible -->"
        insertbefore: "</registration>"
        block: |
          <datatype extension="yaml" type="galaxy.datatypes.text:Text" subclass="True"/>
      when: galaxy_yaml_datatype_check.rc != 0

    - name: Register yml datatype if missing
      ansible.builtin.blockinfile:
        path: "{{ galaxy_datatypes_conf }}"
        marker: "<!-- {mark} YML datatype managed by Ansible -->"
        insertbefore: "</registration>"
        block: |
          <datatype extension="yml" type="galaxy.datatypes.text:Text" subclass="True"/>
      when: galaxy_yml_datatype_check.rc != 0

    - name: Register immuneML receptor datatypes
      ansible.builtin.blockinfile:
        path: "{{ galaxy_datatypes_conf }}"
        marker: "<!-- {mark} immuneML datatypes managed by Ansible -->"
        insertbefore: "</registration>"
        block: |
          <datatype extension="immuneml_receptors" type="galaxy.datatypes.text:Html" subclass="True"/>
          <datatype extension="immuneml_receptors.html" type="galaxy.datatypes.text:Html" subclass="True"/>

    - name: Ensure Galaxy uses managed datatypes_conf.xml
      ansible.builtin.lineinfile:
        path: "{{ galaxy_config_file_resolved }}"
        regexp: '^\s*datatypes_config_file:.*$'
        line: "    datatypes_config_file: {{ galaxy_datatypes_conf }}"
        insertafter: '^galaxy:\s*$'
        backup: true

    - name: Remove cached integrated tool panel
      ansible.builtin.file:
        path: "{{ galaxy_mutable_config_dir_resolved }}/integrated_tool_panel.xml"
        state: absent
      failed_when: false

    - name: Remove existing immuneML welcome source checkout before refresh
      ansible.builtin.file:
        path: "{{ immuneml_welcome_source_dir_resolved }}"
        state: absent
      when: immuneml_welcome_force_refresh_resolved

    - name: Clone immuneML welcome/static assets repository
      ansible.builtin.git:
        repo: "{{ immuneml_welcome_repo_url_resolved }}"
        dest: "{{ immuneml_welcome_source_dir_resolved }}"
        version: "{{ immuneml_welcome_repo_version_resolved }}"
        force: true
        update: true
      become_user: "{{ galaxy_runtime_user_resolved }}"

    - name: Check immuneML welcome assets folder exists
      ansible.builtin.stat:
        path: "{{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}"
      register: immuneml_welcome_folder_status

    - name: Fail if immuneML welcome assets folder is missing
      ansible.builtin.fail:
        msg: >-
          Welcome assets folder was not found at
          {{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}.
      when: not immuneml_welcome_folder_status.stat.exists

    - name: Check immuneML welcome HTML file exists
      ansible.builtin.stat:
        path: "{{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}/{{ immuneml_welcome_html_resolved }}"
      register: immuneml_welcome_html_status

    - name: Fail if immuneML welcome HTML file is missing
      ansible.builtin.fail:
        msg: >-
          Welcome HTML file was not found at
          {{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}/{{ immuneml_welcome_html_resolved }}.
      when: not immuneml_welcome_html_status.stat.exists

    - name: Ensure Galaxy static directory exists
      ansible.builtin.file:
        path: "{{ galaxy_static_dir_resolved }}"
        state: directory
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: "0755"

    - name: Copy immuneML welcome assets into Galaxy static directory
      ansible.builtin.copy:
        src: "{{ immuneml_welcome_source_dir_resolved }}/{{ immuneml_welcome_folder_resolved }}/"
        dest: "{{ galaxy_static_dir_resolved }}/"
        remote_src: true
        owner: "{{ galaxy_runtime_user_resolved }}"
        group: "{{ galaxy_runtime_group_resolved }}"
        mode: preserve

    - name: Check immuneML welcome page exists in Galaxy static directory
      ansible.builtin.stat:
        path: "{{ galaxy_static_dir_resolved }}/{{ immuneml_welcome_html_resolved }}"
      register: immuneml_welcome_html_static_status

    - name: Fail if immuneML welcome page was not copied to Galaxy static directory
      ansible.builtin.fail:
        msg: >-
          Cannot configure Galaxy welcome page because
          {{ galaxy_static_dir_resolved }}/{{ immuneml_welcome_html_resolved }}
          does not exist after copying welcome assets.
      when: not immuneml_welcome_html_static_status.stat.exists

    - name: Generate deploy-time welcome page cache-busting version
      ansible.builtin.command:
        cmd: date +%s
      register: immuneml_welcome_cache_bust_version
      changed_when: false

    - name: Ensure Galaxy uses immuneML welcome page URL with one-time cache busting
      ansible.builtin.lineinfile:
        path: "{{ galaxy_config_file_resolved }}"
        regexp: '^\s*welcome_url:.*$'
        line: "    welcome_url: /static/{{ immuneml_welcome_html_resolved }}?v={{ immuneml_welcome_cache_bust_version.stdout }}"
        insertafter: '^galaxy:\s*$'
        backup: true

    - name: Ensure nginx can traverse Galaxy directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /srv
        - /srv/galaxy
        - /srv/galaxy/server
        - /srv/galaxy/server/static

    - name: Ensure Galaxy static directories are executable/readable
      ansible.builtin.command:
        cmd: "find {{ galaxy_static_dir_resolved }} -type d -exec chmod 0755 {} +"
      changed_when: false

    - name: Ensure Galaxy static files are readable by nginx
      ansible.builtin.command:
        cmd: "find {{ galaxy_static_dir_resolved }} -type f -exec chmod 0644 {} +"
      changed_when: false

    - name: Restart nginx after welcome page configuration
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      failed_when: false

    - name: Restart Galaxy after registering immuneML tools
      ansible.builtin.systemd:
        name: "{{ galaxy_service_unit_resolved }}"
        state: restarted
        daemon_reload: true

    - name: Wait 300 seconds for Galaxy to stabilise after restart
      ansible.builtin.pause:
        seconds: 300

    - name: Confirm Galaxy API responds over HTTP after stabilisation wait
      ansible.builtin.uri:
        url: "{{ galaxy_http_api_healthcheck_url }}"
        method: GET
        status_code: 200
      register: galaxy_http_api_after_restart
      retries: 30
      delay: 10
      until: galaxy_http_api_after_restart.status == 200
      when: not galaxy_enable_https_resolved

    - name: Confirm Galaxy API responds over HTTPS after stabilisation wait
      ansible.builtin.uri:
        url: "{{ galaxy_https_api_healthcheck_url }}"
        method: GET
        status_code: 200
        validate_certs: "{{ galaxy_https_validate_certs }}"
      register: galaxy_https_api_after_restart
      retries: 30
      delay: 10
      until: galaxy_https_api_after_restart.status == 200
      when: galaxy_enable_https_resolved

    - name: Report ImmuneML Galaxy tool registration complete
      ansible.builtin.debug:
        msg:
          - "ImmuneML Galaxy tools registered in menu."
          - "Using immuneML version from wrapper macros."
          - "Refresh Galaxy UI and search for immuneML."
          - "Workflows / All workflows is handled by the Galaxy UI."
          - "Registered wrappers found on disk: {{ immuneml_tool_xml_files }}"
