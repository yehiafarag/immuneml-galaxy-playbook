[defaults]

# Use system Python on Ubuntu target hosts.
interpreter_python = /usr/bin/python3

# Needed because some Galaxy/Ansible become-user operations can create temp files
# that must remain readable between privilege contexts.
allow_world_readable_tmpfiles = True
remote_tmp = /tmp/.ansible-${USER}

# Allow this repo to load locally installed roles.
# The galaxy_deployment role will be installed into ./roles by requirements.yml.
roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles

# Useful for rebuilt test VMs.
# For stricter production security, set this to True.
host_key_checking = False

# Avoid creating .retry files in the repo.
retry_files_enabled = False

[privilege_escalation]

become_method = sudo
become_flags = -H -n
become_allow_world_readable_tmpfiles = True