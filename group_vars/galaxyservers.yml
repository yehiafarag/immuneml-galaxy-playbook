# =====================================================================
# ImmuneML Galaxy deployment configuration
# =====================================================================

# ---------------------------------------------------------------------
# Target VM
# ---------------------------------------------------------------------
galaxy:
  host_ip: "use.real.host.ip"
  ssh_user: "SSH_USER "

# ---------------------------------------------------------------------
# Galaxy admin
# ---------------------------------------------------------------------
galaxy_admin_email: "admin@example.com"

# ---------------------------------------------------------------------
# Database secret
# ---------------------------------------------------------------------
galaxy_database_password: "CHANGE_ME_STRONG_PASSWORD"

# =====================================================================
# ImmuneML runtime defaults
# =====================================================================

immuneml_install_dir: /srv/galaxy/immuneml
immuneml_venv: /srv/galaxy/immuneml/venv
immuneml_reference_dir: /srv/galaxy/mutable/data/immuneml_references
immuneml_run_quickstart: false

# ---------------------------------------------------------------------
# Default values used by deploy.sh if user presses Enter
# ---------------------------------------------------------------------
immuneml_default_install_method: "pypi"

immuneml_default_version: "3.0.27"
immuneml_default_git_repo: "https://github.com/uio-bmi/immuneML.git"
immuneml_default_git_branch: "master"

# Tool Shed defaults
galaxy_url: "http://127.0.0.1"
immuneml_toolshed_url: "https://toolshed.g2.bx.psu.edu"

# Fill this only when using Tool Shed mode.
galaxy_admin_api_key: ""

immuneml_toolshed_repositories: []


# ---------------------------------------------------------------------
# immuneML Galaxy wrapper tools
# ---------------------------------------------------------------------
immuneml_tools_repo_url: "https://github.com/pavelvazquez/immuneml_tools.git"  #"https://github.com/uio-bmi/immuneml_tools.git"
immuneml_tools_version: "main"
immuneml_tools_source_dir: "/srv/galaxy/immuneml_tools_source"
immuneml_tools_force_refresh: true




# ---------------------------------------------------------------------
# immuneML Galaxy welcome/static assets
# ---------------------------------------------------------------------
immuneml_welcome_repo_url: "https://github.com/yehiafarag/immuneml-galaxy-playbook.git"
immuneml_welcome_repo_version: "main"
immuneml_welcome_source_dir: "/srv/galaxy/immuneml_welcome_source"
immuneml_welcome_folder: "files"
immuneml_welcome_html: "welcome_immuneml.html"
immuneml_welcome_force_refresh: true

