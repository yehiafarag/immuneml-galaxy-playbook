# =====================================================================
# ImmuneML Galaxy deployment configuration
# =====================================================================

# ---------------------------------------------------------------------
# Target VM
# ---------------------------------------------------------------------
galaxy:
  host_ip: "use.real.host.ip"
  ssh_user: "SSH_USER "

# ---------------------------------------------------------------------
# Galaxy repository override
# ---------------------------------------------------------------------
galaxy_repo: "https://github.com/galaxyproject/galaxy.git"
galaxy_commit_id: "release_26.0"
galaxy_force_checkout: true

# ---------------------------------------------------------------------
# Galaxy admin
# ---------------------------------------------------------------------
galaxy_admin_email: "admin@example.com"

# ---------------------------------------------------------------------
# Galaxy database secret
# ---------------------------------------------------------------------
# The database user/name/host/port come from galaxy_deployment defaults.
# Only the password should normally be environment-specific.
galaxy_database_password: "CHANGE_ME_STRONG_PASSWORD"

# ---------------------------------------------------------------------
# Galaxy Conda dependency resolver
# ---------------------------------------------------------------------
galaxy_enable_conda_dependencies: true

# ---------------------------------------------------------------------
# HTTPS configuration
# ---------------------------------------------------------------------
galaxy_enable_https: true
galaxy_https_mode: "selfsigned"
galaxy_server_name: "galaxy.local"
galaxy_https_redirect: false

# ---------------------------------------------------------------------
# immuneML runtime strategy
# ---------------------------------------------------------------------
# Galaxy tools should use Conda/Bioconda dependencies from wrapper XML.
# Do not install immuneML with pip inside Galaxy tool environments.
immuneml_runtime_strategy: "conda"
immuneml_cli_runtime_enabled: false

# ---------------------------------------------------------------------
# immuneML Galaxy wrapper tools
# ---------------------------------------------------------------------
# Standard immuneML Galaxy wrappers.
immuneml_tools_repo_url: "https://github.com/uio-bmi/immuneml_tools.git"
immuneml_tools_version: "main"  #"main""update-immuneml-3-0-27"
immuneml_tools_source_dir: "/srv/galaxy/immuneml_tools_source"
immuneml_tools_force_refresh: true

# ---------------------------------------------------------------------
# immuneML Galaxy welcome/static assets
# ---------------------------------------------------------------------

immuneml_welcome_folder: "files"
immuneml_welcome_html: "welcome_immuneml.html"


# =====================================================================
# Orchestration helper variables
# =====================================================================
# These variables are used by immuneml.yml before/after the Galaxy role.
# They keep the playbook clean and avoid relying on role defaults before
# the role is loaded.

# ---------------------------------------------------------------------
# Galaxy server path helpers
# ---------------------------------------------------------------------
galaxy_root_resolved: "{{ galaxy_root | default('/srv/galaxy') }}"
galaxy_server_dir_resolved: "{{ galaxy_server_dir | default(galaxy_root_resolved ~ '/server') }}"
galaxy_config_dir_resolved: "{{ galaxy_config_dir | default(galaxy_root_resolved ~ '/config') }}"
galaxy_config_file_resolved: "{{ galaxy_config_dir_resolved }}/galaxy.yml"
galaxy_service_unit_resolved: "{{ galaxy_service_name | default('galaxy') }}"

# ---------------------------------------------------------------------
# Galaxy runtime/user helpers
# ---------------------------------------------------------------------
galaxy_runtime_user_resolved: "{{ galaxy_user_name | default('galaxy') }}"
galaxy_runtime_group_resolved: "{{ galaxy_user_name | default('galaxy') }}"

# ---------------------------------------------------------------------
# Galaxy Conda dependency resolver helpers
# ---------------------------------------------------------------------
galaxy_dependency_resolvers_conf: "{{ galaxy_config_dir_resolved }}/dependency_resolvers_conf.xml"
galaxy_conda_prefix_resolved: "{{ miniconda_prefix | default(galaxy_root_resolved ~ '/mutable/dependencies/_conda') }}"
galaxy_enable_conda_dependencies_resolved: "{{ galaxy_enable_conda_dependencies | default(true) | bool }}"

# ---------------------------------------------------------------------
# immuneML runtime strategy helpers
# ---------------------------------------------------------------------
immuneml_runtime_strategy_resolved: "{{ immuneml_runtime_strategy | default('conda') }}"
immuneml_cli_runtime_enabled_resolved: "{{ immuneml_cli_runtime_enabled | default(false) | bool }}"

# ---------------------------------------------------------------------
# Galaxy tool/menu/datatype helper paths
# ---------------------------------------------------------------------
galaxy_tool_dir_resolved: "{{ galaxy_tool_dir | default(galaxy_server_dir_resolved ~ '/tools') }}"
galaxy_mutable_config_dir_resolved: "{{ galaxy_mutable_config_dir | default(galaxy_root_resolved ~ '/mutable/config') }}"

galaxy_tool_conf: "{{ galaxy_config_dir_resolved }}/tool_conf.xml"
galaxy_config_file: "{{ galaxy_config_file_resolved }}"
galaxy_datatypes_conf: "{{ galaxy_config_dir_resolved }}/datatypes_conf.xml"
galaxy_builtin_datatypes_conf: "{{ galaxy_server_dir_resolved }}/config/datatypes_conf.xml.sample"
galaxy_static_dir_resolved: "{{ galaxy_server_dir_resolved }}/static"

# ---------------------------------------------------------------------
# immuneML Galaxy wrapper helper paths
# ---------------------------------------------------------------------
immuneml_tools_repo_resolved: "{{ immuneml_tools_repo_url | default('https://github.com/uio-bmi/immuneml_tools.git') }}"
immuneml_tools_version_resolved: "{{ immuneml_tools_version | default('main') }}"
immuneml_tools_source_dir_resolved: "{{ immuneml_tools_source_dir | default(galaxy_root_resolved ~ '/immuneml_tools_source') }}"
immuneml_tools_force_refresh_resolved: "{{ immuneml_tools_force_refresh | default(true) | bool }}"

immuneml_tool_dir: "{{ galaxy_tool_dir_resolved }}/immuneml"
immuneml_prod_macros_path: "{{ immuneml_tool_dir }}/prod_macros.xml"


# ---------------------------------------------------------------------
# immuneML welcome/static helper paths
# ---------------------------------------------------------------------
immuneml_welcome_repo_url_resolved: "{{ immuneml_welcome_repo_url | default('https://github.com/yehiafarag/immuneml-galaxy-playbook.git') }}"
immuneml_welcome_repo_version_resolved: "{{ immuneml_welcome_repo_version | default('main') }}"
immuneml_welcome_source_dir_resolved: "{{ immuneml_welcome_source_dir | default(galaxy_root_resolved ~ '/immuneml_welcome_source') }}"
immuneml_welcome_folder_resolved: "{{ immuneml_welcome_folder | default('files') }}"
immuneml_welcome_html_resolved: "{{ immuneml_welcome_html | default('welcome_immuneml.html') }}"
immuneml_welcome_force_refresh_resolved: "{{ immuneml_welcome_force_refresh | default(true) | bool }}"

# ---------------------------------------------------------------------
# Galaxy health check helpers
# ---------------------------------------------------------------------
galaxy_enable_https_resolved: "{{ galaxy_enable_https | default(false) | bool }}"

galaxy_http_api_healthcheck_url: "http://127.0.0.1/api/version"
galaxy_https_api_healthcheck_url: "https://127.0.0.1/api/version"

# false is needed for self-signed certificates
galaxy_https_validate_certs: false

# ---------------------------------------------------------------------
# Galaxy branding configuration
# ---------------------------------------------------------------------
galaxy_brand: "ImmuneML"

galaxy_brand_resolved: "{{ galaxy_brand | default('Galaxy') }}"
galaxy_page_title_resolved: "{{ galaxy_page_title | default(galaxy_brand_resolved) }}"

# Optional local favicon files on the Ansible controller.
# Example:
#   galaxy_favicon_ico_src: "files/favicon.ico"
#   galaxy_favicon_svg_src: "files/favicon.svg"
#galaxy_favicon_ico_src: "files/favicon.ico"
#galaxy_favicon_svg_src: "files/favicon.svg"